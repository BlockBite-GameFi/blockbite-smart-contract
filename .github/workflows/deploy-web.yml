name: Deploy Web (Vercel)

# Deploys apps/web to Vercel.
#   - push to main touching apps/web  -> production deploy
#   - manual run (workflow_dispatch)  -> "Redeploy" button in the Actions tab
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   VERCEL_TOKEN       Account token from https://vercel.com/account/tokens
#   VERCEL_ORG_ID      From apps/web/.vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID  From apps/web/.vercel/project.json after `vercel link`
#
# This needs NO Vercel dashboard access at deploy time: once the 3 secrets exist,
# every push to main (or a manual run) ships production automatically.

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-web-prod
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Guard missing secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Missing one of VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID repo secrets. See header of deploy-web.yml."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build (production, prebuilt)
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt to production
        run: |
          url=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "Deployed: $url"
          echo "## Deployed to production" >> "$GITHUB_STEP_SUMMARY"
          echo "$url" >> "$GITHUB_STEP_SUMMARY"

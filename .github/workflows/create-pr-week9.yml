name: Create Week 9 PR (one-shot)

on:
  push:
    branches:
      - week9-documentation

permissions:
  pull-requests: write
  contents: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR via REST API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/create-pr.sh

      - name: Remove one-shot workflow and script
        if: always()
        run: |
          git config user.email "nayrbryangaming3@gmail.com"
          git config user.name "nayrbryanGaming"
          git pull --rebase origin week9-documentation
          git rm .github/workflows/create-pr-week9.yml
          git rm .github/scripts/create-pr.sh
          git commit -m "ci: remove one-shot PR creation workflow"
          git push origin week9-documentation

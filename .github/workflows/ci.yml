name: Anchor CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  anchor:
    name: Build and test Anchor program
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli --locked

      - name: Generate local wallet
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase --silent --outfile ~/.config/solana/id.json

      - name: Create program keypair
        run: anchor build

      - name: Sync generated program key
        run: anchor keys sync

      - name: Build program
        run: anchor build

      - name: Run tests
        run: anchor test

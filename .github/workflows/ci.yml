name: Blockbite CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  smart-contract:
    name: Build & Test Anchor Program
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Rust toolchain ────────────────────────────────────────────────────
      # Anchor 0.32.1 requires Rust >= 1.85.0
      - name: Setup Rust 1.85.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      # ── 3. Restore caches ────────────────────────────────────────────────────
      # Cache compiled anchor binary + cargo registry + program build artifacts.
      # Anchor binary is included so cargo install only runs on cache miss.
      - name: Cache Cargo registry + Anchor binary
        id: cache-cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/anchor
            blockbite/target
          key: ${{ runner.os }}-rust1.85-anchor0.32.1-${{ hashFiles('blockbite/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust1.85-anchor0.32.1-
            ${{ runner.os }}-rust1.85-

      # ── 4. System dependencies ───────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      # ── 5. Node.js ───────────────────────────────────────────────────────────
      # Setup Node BEFORE Solana so the yarn cache key resolves correctly.
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: blockbite/yarn.lock

      # ── 6. Solana CLI ────────────────────────────────────────────────────────
      # Pinned to v2.1.21 (latest stable 2.x).
      # Agave 3.x requires io_uring which is DISABLED on GitHub Actions runners.
      - name: Install Solana CLI v2.1.21
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.21/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      # ── 7. Anchor CLI 0.32.1 ─────────────────────────────────────────────────
      # No pre-built binary exists for v0.32.1 and AVM binaries require
      # GLIBC_2.38 which is absent on ubuntu-latest runners.
      # Compiled from source and cached — only re-runs on cache miss (~8 min).
      - name: Install Anchor CLI 0.32.1 (from source, cached)
        if: steps.cache-cargo.outputs.cache-hit != 'true'
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.32.1 anchor-cli --locked --force

      # ── 8. Verify tool versions ──────────────────────────────────────────────
      - name: Verify tool versions
        run: |
          rustc --version
          solana --version
          anchor --version
          node --version
          yarn --version

      # ── 9. Solana wallet & CLI config ────────────────────────────────────────
      - name: Configure Solana CLI
        run: |
          solana-keygen new --no-bip39-passphrase --silent \
            --outfile ~/.config/solana/id.json
          solana config set \
            --url http://127.0.0.1:8899 \
            --keypair ~/.config/solana/id.json

      # ── 10. Program keypair ──────────────────────────────────────────────────
      # Use the secret keypair to keep the program ID stable across runs.
      # Falls back to an ephemeral key (with anchor keys sync) when absent.
      - name: Restore program keypair
        working-directory: blockbite
        run: |
          mkdir -p target/deploy
          if [ -n "${{ secrets.ANCHOR_PROGRAM_KEYPAIR }}" ]; then
            echo '${{ secrets.ANCHOR_PROGRAM_KEYPAIR }}' \
              > target/deploy/blockbite-keypair.json
            echo "Using program keypair from secret"
          else
            solana-keygen new --no-bip39-passphrase --silent \
              --outfile target/deploy/blockbite-keypair.json
            echo "No ANCHOR_PROGRAM_KEYPAIR — using ephemeral key"
          fi

      # ── 11. Sync program ID ──────────────────────────────────────────────────
      # When using an ephemeral key the derived address differs from the
      # hardcoded ID. anchor keys sync patches lib.rs + Anchor.toml so the
      # build always succeeds regardless of which keypair is in use.
      - name: Sync program ID
        working-directory: blockbite
        run: anchor keys sync

      # ── 12. Node dependencies ────────────────────────────────────────────────
      - name: Install Node dependencies
        working-directory: blockbite
        run: yarn install --frozen-lockfile

      # ── 13. Build ────────────────────────────────────────────────────────────
      - name: Build Anchor program
        working-directory: blockbite
        run: anchor build

      # ── 14. Rust unit tests ──────────────────────────────────────────────────
      # Run unit tests defined in lib.rs (#[cfg(test)] modules).
      # The workspace root Cargo.lock lives in blockbite/, so --manifest-path
      # points at the program crate directly.
      - name: Run Rust unit tests
        working-directory: blockbite
        run: cargo test --manifest-path programs/blockbite/Cargo.toml --package blockbite

      # ── 15. Integration tests (TypeScript) ───────────────────────────────────
      # Uses anchor test --skip-build so we don't rebuild the already-built
      # program. Anchor will start/stop solana-test-validator automatically,
      # honouring startup_wait = 120000 from Anchor.toml.
      - name: Run integration tests
        working-directory: blockbite
        env:
          ANCHOR_WALLET: /home/runner/.config/solana/id.json
          ANCHOR_PROVIDER_URL: http://127.0.0.1:8899
        run: |
          anchor test --skip-build \
            --provider.cluster localnet \
            --provider.wallet /home/runner/.config/solana/id.json
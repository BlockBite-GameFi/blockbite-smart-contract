name: Deploy to Devnet

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm devnet deployment'
        required: true
        default: ''

jobs:
  deploy:
    name: Anchor deploy → Devnet
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: ${{ github.workspace }}/target

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust 1.91.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.0"

      # Caches: ~/.cargo/registry + ~/.cargo/git + target/
      # First miss: ~3 min populated. Hit: <30s.
      - name: Cache Cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install native build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      # Solana CLI cache (~120MB). Saves ~30s install on hit.
      - name: Cache Solana CLI
        uses: actions/cache@v4
        id: solana-cache
        with:
          path: |
            ~/.cache/solana
            ~/.local/share/solana/install
          key: solana-${{ runner.os }}-stable

      - name: Install Solana CLI
        if: steps.solana-cache.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      # avm + anchor binary cache. First miss: ~5 min building avm from source.
      # Hit: instant (avm already installed, anchor binary present).
      - name: Cache Anchor CLI 1.0.0 (avm)
        uses: actions/cache@v4
        id: anchor-cache
        with:
          path: |
            ~/.avm
            ~/.cargo/bin/avm
            ~/.cargo/bin/anchor
          key: anchor-avm-${{ runner.os }}-1.0.0

      - name: Install Anchor CLI 1.0.0 via AVM
        if: steps.anchor-cache.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install 1.0.0
          avm use 1.0.0

      - name: Ensure Anchor CLI is active
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          avm use 1.0.0
          anchor --version

      - name: Restore deployer keypair
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.DEVNET_DEPLOYER_KEYPAIR }}' > ~/.config/solana/id.json
          solana-keygen pubkey ~/.config/solana/id.json

      - name: Restore program keypair
        run: |
          mkdir -p target/deploy
          echo '${{ secrets.ANCHOR_PROGRAM_KEYPAIR }}' > target/deploy/blockbite-keypair.json

      - name: Sync program ID
        run: anchor keys sync

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Build program
        run: anchor build

      - name: Check devnet balance
        run: |
          PUBKEY=$(solana-keygen pubkey ~/.config/solana/id.json)
          BALANCE=$(solana balance "$PUBKEY" --url devnet 2>/dev/null || echo "ERROR")
          echo "Deployer: $PUBKEY"
          echo "Balance:  $BALANCE"
          if echo "$BALANCE" | grep -q "ERROR\|0 SOL"; then
            echo "::error::Deployer has insufficient SOL on devnet. Fund it first."
            exit 1
          fi

      - name: Deploy to Devnet (write-buffer + atomic upgrade)
        env:
          DEVNET_RPC_URL: ${{ secrets.HELIUS_DEVNET_RPC_URL }}
        run: |
          set -euo pipefail

          # Helius devnet is much more reliable than api.devnet.solana.com for
          # large data writes; falls back to public devnet if secret is unset.
          RPC_URL="${DEVNET_RPC_URL:-https://api.devnet.solana.com}"
          echo "Deploying via RPC: ${RPC_URL%%\?*}"  # strip api-key from log
          solana config set --url "$RPC_URL" > /dev/null

          PROGRAM_ID=$(solana-keygen pubkey target/deploy/blockbite-keypair.json)
          DEPLOYER=$(solana-keygen pubkey ~/.config/solana/id.json)
          echo "Program ID: $PROGRAM_ID"
          echo "Deployer:   $DEPLOYER"

          # Two-phase deploy:
          #   Phase 1 (slow, ~3-5 min): chunked write to a buffer account.
          #     Uses --max-sign-attempts 200 so transient RPC errors retry
          #     in-place instead of aborting the whole upload.
          #   Phase 2 (instant, atomic): single Upgrade instruction that swaps
          #     the buffer into the program account.
          # If Phase 1 fails, the cleanup trap closes the orphaned buffer and
          # recovers the ~2.6 SOL rent (otherwise it would leak per failed run).
          BUFFER_KP="$(mktemp --suffix=.json)"
          solana-keygen new --no-bip39-passphrase --silent -o "$BUFFER_KP"
          BUFFER_PK=$(solana-keygen pubkey "$BUFFER_KP")
          echo "Buffer:     $BUFFER_PK"

          NEEDS_CLEANUP=1
          cleanup() {
            if [ "$NEEDS_CLEANUP" = "1" ]; then
              echo "::warning::Deploy failed — closing buffer $BUFFER_PK to recover rent"
              solana program close "$BUFFER_PK" \
                --recipient "$DEPLOYER" \
                --keypair ~/.config/solana/id.json \
                --url "$RPC_URL" 2>&1 || true
            fi
            rm -f "$BUFFER_KP"
          }
          trap cleanup EXIT

          # ── Phase 1: write program data to buffer (resilient) ────────────────
          echo "Phase 1: solana program write-buffer..."
          solana program write-buffer \
            target/deploy/blockbite.so \
            --buffer "$BUFFER_KP" \
            --buffer-authority ~/.config/solana/id.json \
            --keypair ~/.config/solana/id.json \
            --url "$RPC_URL" \
            --use-rpc \
            --max-sign-attempts 200 \
            --with-compute-unit-price 100000

          # ── Phase 2: atomic upgrade from buffer (instant) ────────────────────
          echo "Phase 2: solana program deploy --buffer..."
          solana program deploy \
            --buffer "$BUFFER_KP" \
            --program-id target/deploy/blockbite-keypair.json \
            --upgrade-authority ~/.config/solana/id.json \
            --keypair ~/.config/solana/id.json \
            --url "$RPC_URL"

          # Buffer is consumed by the upgrade — skip cleanup.
          NEEDS_CLEANUP=0
          echo "✅ Deployed to Devnet"
          echo "Program ID: $PROGRAM_ID"

      - name: Verify deployment
        run: |
          PROGRAM_ID=$(anchor keys list | grep blockbite | awk '{print $2}')
          echo "Verifying program $PROGRAM_ID on devnet..."
          solana program show "$PROGRAM_ID" --url devnet

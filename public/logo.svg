<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="BlockBite Web3">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D22"/>
      <stop offset="100%" stop-color="#0A0A1E"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full background -->
  <rect width="320" height="80" rx="14" fill="url(#bgGrad)"/>

  <!-- ── ICON MARK (64x64, offset 8,8) ─────────────────────────── -->
  <!-- 4 colored blocks in 2x2 tetromino grid -->
  <rect x="8"  y="8"  width="28" height="28" rx="6" fill="#00F5FF" opacity="0.92"/>
  <rect x="40" y="8"  width="28" height="28" rx="6" fill="#FF00FF" opacity="0.92"/>
  <rect x="8"  y="40" width="28" height="28" rx="6" fill="#FFD700" opacity="0.92"/>
  <rect x="40" y="40" width="28" height="28" rx="6" fill="#00FF88" opacity="0.92"/>

  <!-- Inner highlights on blocks -->
  <rect x="10" y="10" width="10" height="5" rx="2" fill="white" opacity="0.25"/>
  <rect x="42" y="10" width="10" height="5" rx="2" fill="white" opacity="0.25"/>
  <rect x="10" y="42" width="10" height="5" rx="2" fill="white" opacity="0.25"/>
  <rect x="42" y="42" width="10" height="5" rx="2" fill="white" opacity="0.25"/>

  <!-- BITE: dark circular chomp eating into the center -->
  <circle cx="36" cy="36" r="18" fill="#0A0A1E"/>
  <!-- Subtle inner ring -->
  <circle cx="36" cy="36" r="18" fill="none" stroke="#1A1A36" stroke-width="2"/>

  <!-- TEETH — 8-bit style rects pointing inward toward the bite center -->
  <!-- Top teeth (pointing down into bite) -->
  <rect x="24" y="18" width="6" height="10" rx="2" fill="white"/>
  <rect x="34" y="16" width="6" height="10" rx="2" fill="white"/>
  <!-- Right teeth (pointing left into bite) -->
  <rect x="46" y="26" width="10" height="6" rx="2" fill="white"/>
  <rect x="48" y="36" width="10" height="6" rx="2" fill="white"/>
  <!-- Bottom-right teeth re-enter from BR block -->
  <rect x="46" y="48" width="10" height="6" rx="2" fill="white" opacity="0.7"/>
  <rect x="34" y="54" width="6" height="10" rx="2" fill="white" opacity="0.7"/>

  <!-- EYE inside top-left block -->
  <circle cx="20" cy="20" r="5" fill="#0A0A1E"/>
  <circle cx="21" cy="19" r="2" fill="white"/>
  <!-- Pupil -->
  <circle cx="20" cy="20" r="1.5" fill="#00F5FF"/>

  <!-- ── TEXT MARK ──────────────────────────────────────────────── -->
  <!-- "BLOCK" in white -->
  <text
    x="84" y="38"
    font-family="'Orbitron', 'Share Tech Mono', monospace"
    font-size="26"
    font-weight="900"
    fill="#FFFFFF"
    letter-spacing="1"
    filter="url(#glow)"
  >BLOCK</text>

  <!-- "BITE" in neon green -->
  <text
    x="179" y="38"
    font-family="'Orbitron', 'Share Tech Mono', monospace"
    font-size="26"
    font-weight="900"
    fill="#00FF88"
    letter-spacing="1"
    filter="url(#glow)"
  >BITE</text>

  <!-- Separator line under text -->
  <rect x="84" y="44" width="220" height="1.5" rx="1" fill="url(#textGrad)" opacity="0.4"/>

  <!-- Sub-label: WEB3 · SOLANA -->
  <text
    x="84" y="60"
    font-family="'Share Tech Mono', 'Courier New', monospace"
    font-size="11"
    fill="#55557A"
    letter-spacing="3"
  >WEB3  ·  SOLANA  ·  PLAY TO EARN</text>

  <!-- WEB3 badge pill -->
  <rect x="275" y="8" width="38" height="17" rx="8" fill="rgba(0,245,255,0.12)" stroke="#00F5FF" stroke-width="0.8" opacity="0.8"/>
  <text
    x="294" y="20"
    font-family="'Share Tech Mono', monospace"
    font-size="8"
    font-weight="700"
    fill="#00F5FF"
    text-anchor="middle"
    letter-spacing="1"
  >BETA</text>
</svg>

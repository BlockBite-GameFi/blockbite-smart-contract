<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BlockBite — Automated, milestone-based token vesting on Solana. Developer documentation.">
  <title>BlockBite Docs</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍔</text></svg>">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --theme-color: #9945FF;
      --sidebar-background: #0d0d1a;
      --sidebar-nav-link-color: #c8c8e0;
      --sidebar-nav-link-color--hover: #14F195;
      --sidebar-nav-link-color--active: #14F195;
      --base-background-color: #111122;
      --base-color: #e0e0f0;
      --heading-color: #ffffff;
      --link-color: #9945FF;
      --link-color--hover: #14F195;
      --code-theme-background: #1e1e3a;
      --code-theme-text: #e0e0ff;
      --cover-background-color: linear-gradient(135deg, #0d0d1a 0%, #1a0533 50%, #0d1a0d 100%);
      --cover-heading-color: #ffffff;
      --cover-blockquote-color: #9945FF;
      --sidebar-width: 280px;
      --font-size-base: 15px;
    }

    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    .cover-main { text-align: center; }
    .cover-main h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -1px; }
    .cover-main > p:first-of-type { font-size: 1.1rem; color: #9945FF; font-weight: 600; }

    .app-sub-sidebar li::before { content: "›  "; color: #9945FF; }

    /* Solana-gradient badges */
    .badge-solana {
      background: linear-gradient(90deg, #9945FF, #14F195);
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75em;
      font-weight: 700;
    }

    /* Syntax highlight overrides */
    .token.keyword { color: #9945FF; }
    .token.string  { color: #14F195; }
    .token.comment { color: #666; }

    /* Table improvements */
    table { border-radius: 8px; overflow: hidden; }
    th { background: #1e1e3a; color: #9945FF; }

    /* Callout boxes */
    blockquote { border-left: 4px solid #9945FF; background: #1a1a2e; border-radius: 0 8px 8px 0; }

    /* Sidebar section headers */
    .sidebar-nav > ul > li > p { color: #9945FF; font-weight: 700; text-transform: uppercase; font-size: 0.75em; letter-spacing: 1px; margin: 1.5rem 0 0.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '🍔 BlockBite',
      nameLink: '/',
      repo: 'https://github.com/BlockBite-GameFi/blockbite-smart-contract',
      loadSidebar: '_sidebar.md',
      coverpage: '_coverpage.md',
      onlyCover: false,
      autoHeader: true,
      subMaxLevel: 3,
      themeColor: '#9945FF',
      homepage: 'README.md',
      relativePath: true,
      requestHeaders: { 'cache-control': 'max-age=600' },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍  Search BlockBite docs...',
        noData: 'No results. Try different keywords.',
        depth: 6,
        hideOtherSidebarContent: false,
      },
      copyCode: {
        buttonText: '📋 Copy',
        errorText: '❌ Error',
        successText: '✅ Copied!',
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
        crossChapterText: true,
      },
      plugins: [
        function(hook) {
          hook.beforeEach(function(html) {
            // Add "Edit on GitHub" link to every page
            var url = 'https://github.com/BlockBite-GameFi/blockbite-smart-contract/blob/main/docs/' + this.$route.file;
            var editHtml = '> 📝 **Found an error?** [Edit this page on GitHub](' + url + ')\n\n';
            return editHtml + html;
          });
        }
      ],
    };
  </script>

  <!-- Core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <!-- Syntax Highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
</body>
</html>
